<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D&D 2024 Level Up Tool</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Pro:wght@300;400;600&display=swap" rel="stylesheet">
<style>
body{
background:#1a1209;
color:#1a1209;
font-family:'Crimson Pro',serif;
padding:30px;
display:flex;
justify-content:center;
}

.container{
max-width:1000px;
width:100%;
background:#f4e8c1;
padding:30px;
border:3px solid #c9973a;
}

h1{
font-family:'Cinzel',serif;
color:#8b1a1a;
margin-bottom:20px;
}

.controls{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:20px;
margin-bottom:20px;
}

select,input{
padding:8px;
font-size:16px;
}

button{
padding:12px;
background:#8b1a1a;
color:white;
border:none;
cursor:pointer;
margin-top:10px;
}

.level-card{
background:white;
padding:16px;
margin-top:15px;
border-left:6px solid #8b1a1a;
}

.level-title{
font-family:'Cinzel';
margin-bottom:10px;
}

.section{
margin-top:10px;
padding-left:10px;
border-left:3px solid #c9973a;
}

.section h4{
margin-bottom:4px;
font-family:'Cinzel';
}

.feature{margin-bottom:6px}

.choice{
background:#fff7e3;
padding:6px;
margin-bottom:6px;
}

.timeline{
display:flex;
gap:6px;
margin-bottom:15px;
flex-wrap:wrap;
}

.timeline div{
padding:6px 10px;
border:1px solid #8b1a1a;
cursor:pointer;
}

.timeline .active{
background:#8b1a1a;
color:white;
}

</style>
</head>
<body>

<div class="container">

<h1>Level Up Planner (Levels 1‑10)</h1>

<div class="controls">

<div>
<label>Class</label>
<select id="classSelect"></select>
</div>

<div>
<label>From Level</label>
<input id="fromLevel" type="number" min="1" max="9" value="1">
</div>

<div>
<label>To Level</label>
<input id="toLevel" type="number" min="2" max="10" value="5">
</div>

</div>

<button onclick="generate()">Show Level Gains</button>

<div class="timeline" id="timeline"></div>

<div id="results"></div>

</div>

<script>

const ASI_LEVELS=[4,8]
const PROF={1:2,2:2,3:2,4:2,5:3,6:3,7:3,8:3,9:4,10:4}

const CLASSES={

3:{choice:["Primal Path"]},
4:{choice:["Ability Score Improvement or Feat"]},

6:{auto:["Subclass Feature"]},

8:{choice:["Ability Score Improvement or Feat"]},

}
},

 levels:{
1:{auto:["Bardic Inspiration","Spellcasting"]},

3:{choice:["Bard College"]},
4:{choice:["Ability Score Improvement or Feat"]},
5:{auto:["Font of Inspiration"]},
6:{auto:["Subclass Feature"]},
7:{auto:["4th‑Level Spells"]},
8:{choice:["Ability Score Improvement or Feat"]},
9:{auto:["5th‑Level Spells"]},
10:{auto:["Magical Secrets"]}
}
},

 hitDie:8,
 subclasses:["Life","Light","War","Knowledge"],
 levels:{
1:{auto:["Divine Order","Spellcasting"]},
2:{auto:["Channel Divinity"]},
3:{choice:["Divine Domain"]},
4:{choice:["Ability Score Improvement or Feat"]},
5:{auto:["Destroy Undead","3rd‑Level Spells"]},
6:{auto:["Subclass Feature"]},
7:{auto:["4th‑Level Spells"]},
8:{choice:["Ability Score Improvement or Feat"]},
9:{auto:["5th‑Level Spells"]},
10:{auto:["Divine Intervention"]}
}
},

druid:{
 hitDie:8,
 subclasses:["Land","Moon","Stars","Wildfire"],
 levels:{
1:{auto:["Druidic","Spellcasting"]},
2:{auto:["Wild Shape"]},
3:{choice:["Druid Circle"]},
4:{choice:["Ability Score Improvement or Feat"]},
5:{auto:["3rd‑Level Spells"]},
6:{auto:["Subclass Feature"]},
7:{auto:["4th‑Level Spells"]},
8:{choice:["Ability Score Improvement or Feat"]},
9:{auto:["5th‑Level Spells"]},
10:{auto:["Subclass Feature"]}
}
},

fighter:{
 hitDie:10,
 subclasses:["Champion","Battle Master","Eldritch Knight","Psi Warrior"],
 levels:{
1:{auto:["Fighting Style","Second Wind","Weapon Mastery"]},
2:{auto:["Action Surge","Tactical Mind"]},
3:{choice:["Martial Archetype"]},
4:{choice:["Ability Score Improvement or Feat"]},
5:{auto:["Extra Attack"]},
6:{choice:["Ability Score Improvement or Feat"]},
7:{auto:["Subclass Feature"]},
8:{choice:["Ability Score Improvement or Feat"]},
9:{auto:["Indomitable"]},
10:{auto:["Subclass Feature"]}
}
},

monk:{
 hitDie:8,
 subclasses:["Open Hand","Shadow","Elements","Mercy"],
 levels:{
1:{auto:["Martial Arts","Unarmored Defense"]},
2:{auto:["Ki","Unarmored Movement"]},
3:{choice:["Monastic Tradition"]},
4:{choice:["Ability Score Improvement or Feat"]},
5:{auto:["Extra Attack","Stunning Strike"]},
6:{auto:["Subclass Feature"]},
7:{auto:["Evasion","Stillness of Mind"]},
8:{choice:["Ability Score Improvement or Feat"]},
9:{auto:["Improved Movement"]},
10:{auto:["Self‑Restoration"]}
}
},

paladin:{

 subclasses:["Devotion","Ancients","Vengeance","Glory"],
 levels:{
1:{auto:["Lay on Hands","Weapon Mastery"]},
2:{auto:["Fighting Style","Divine Smite","Spellcasting"]},
3:{choice:["Sacred Oath"]},
4:{choice:["Ability Score Improvement or Feat"]},
5:{auto:["Extra Attack"]},
6:{auto:["Aura of Protection"]},
7:{auto:["Subclass Feature"]},
8:{choice:["Ability Score Improvement or Feat"]},
9:{auto:["3rd‑Level Spells"]},
10:{auto:["Aura Improvement"]}
}
},

ranger:{
 hitDie:10,
 subclasses:["Hunter","Beast Master","Gloom Stalker","Fey Wanderer"],
 levels:{
1:{auto:["Favored Enemy","Weapon Mastery"]},
2:{auto:["Fighting Style","Spellcasting"]},
3:{choice:["Ranger Conclave"]},
4:{choice:["Ability Score Improvement or Feat"]},
5:{auto:["Extra Attack"]},
6:{auto:["Roving"]},
7:{auto:["Subclass Feature"]},
8:{choice:["Ability Score Improvement or Feat"]},

}

4:{choice:["Ability Score Improvement or Feat"]},

9:{auto:["5th‑Level Spells"]},
10:{auto:["Metamagic Improvement"]}
}
},

warlock:{

 subclasses:["Fiend","Archfey","Great Old One","Celestial"],
 levels:{
1:{auto:["Pact Magic","Eldritch Invocations"]},
2:{auto:["More Invocations"]},
3:{choice:["Warlock Patron"]},
4:{choice:["Ability Score Improvement or Feat"]},
5:{auto:["3rd‑Level Pact Slots"]},

7:{auto:["4th‑Level Pact Slots"]},

}
},

wizard:{

1:{auto:["Spellcasting","Arcane Recovery"]},

6:{auto:["Subclass Feature"]},
7:{auto:["4th‑Level Spells"]},

9:{auto:["5th‑Level Spells"]},
10:{auto:["Subclass Feature"]}
}

}

const classSelect=document.getElementById("classSelect")

Object.keys(CLASSES).forEach(c=>{
 const opt=document.createElement("option")
 opt.value=c
 opt.innerText=c
 classSelect.appendChild(opt)
})

function generate(){

const cls=classSelect.value
const from=parseInt(document.getElementById("fromLevel").value)
const to=parseInt(document.getElementById("toLevel").value)

const data=CLASSES[cls]

const res=document.getElementById("results")
const timeline=document.getElementById("timeline")

res.innerHTML=""
timeline.innerHTML=""

for(let i=1;i<=10;i++){
 const t=document.createElement("div")
 t.innerText=i
 if(i>from && i<=to) t.classList.add("active")
 timeline.appendChild(t)
}

for(let lvl=from+1;lvl<=to;lvl++){

const card=document.createElement("div")
card.className="level-card"

let html=`<div class='level-title'>Level ${lvl}</div>`

html+=`<div class='section'><h4>Scaling</h4>
<div class='feature'>Proficiency Bonus: +${PROF[lvl]}</div>
<div class='feature'>HP Increase: ${Math.floor(data.hitDie/2)+1}+CON</div>
</div>`

const levelData=data.levels[lvl]

if(levelData?.auto){
html+=`<div class='section'><h4>Automatic Gains</h4>`
levelData.auto.forEach(f=>{
 html+=`<div class='feature'>• ${f}</div>`
})
html+=`</div>`
}

if(levelData?.choice){
html+=`<div class='section'><h4>Choices</h4>`
levelData.choice.forEach(c=>{
 html+=`<div class='choice'>${c}`
 if(c.toLowerCase().includes("subclass")||c.toLowerCase().includes("path")||c.toLowerCase().includes("tradition")||c.toLowerCase().includes("oath")||c.toLowerCase().includes("college")||c.toLowerCase().includes("origin")||c.toLowerCase().includes("patron")){
 html+=`<br>Options: ${data.subclasses.join(", ")}`
 }
 html+=`</div>`
})
html+=`</div>`
}

card.innerHTML=html
res.appendChild(card)

}

}

</script>

</body>
</html>
