<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Character Forge | Combat Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{--p:#f4e8c1;--pd:#e8d5a0;--ink:#1a1209;--il:#3d2b1a;--cr:#8b1a1a;--crl:#b52a2a;--go:#c9973a;--gl:#e8b84b;--green:#1a5c2a;--bg:#1a1209;--dead:#555;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);min-height:100vh;font-family:"Crimson Pro",serif;color:var(--ink);padding:1.5rem 1rem 4rem;}
h1{font-family:"Cinzel",serif;font-weight:900;font-size:clamp(1.6rem,4vw,2.4rem);color:var(--gl);letter-spacing:.08em;text-align:center;text-shadow:0 2px 16px rgba(201,151,58,.4);}
.sub{text-align:center;color:var(--pd);font-style:italic;font-size:1rem;opacity:.7;margin:.25rem 0 1.2rem;}
.dv{width:220px;height:2px;margin:.6rem auto 1.2rem;background:linear-gradient(90deg,transparent,var(--go),transparent);}
.back{display:inline-block;margin-bottom:1rem;font-family:"Cinzel",serif;font-size:.68rem;letter-spacing:.1em;color:var(--go);text-decoration:none;opacity:.7;}
.back:hover{opacity:1;}
/* Layout */
.layout{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:1fr 340px;gap:1.5rem;align-items:start;}
/* Panel shell */
.panel{background:var(--p);border-radius:4px;box-shadow:0 0 0 2px var(--go),0 0 0 4px var(--cr),0 4px 32px rgba(0,0,0,.6);overflow:hidden;}
.panel-hdr{background:rgba(26,18,9,.95);padding:.75rem 1.2rem;font-family:"Cinzel",serif;font-size:.72rem;letter-spacing:.15em;text-transform:uppercase;color:var(--gl);display:flex;align-items:center;justify-content:space-between;gap:.5rem;}
.panel-body{padding:1rem 1.2rem;}
/* Section title */
.sec{font-family:"Cinzel",serif;font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;color:var(--cr);margin-bottom:.6rem;padding-bottom:.3rem;border-bottom:1px solid rgba(139,26,26,.2);}
/* Buttons */
.btn{display:inline-flex;align-items:center;gap:.35rem;padding:.45rem 1rem;font-family:"Cinzel",serif;font-size:.65rem;letter-spacing:.09em;border-radius:3px;cursor:pointer;transition:all .18s;border:1px solid;white-space:nowrap;}
.btn-primary{background:var(--cr);color:var(--p);border-color:var(--go);}
.btn-primary:hover{background:var(--crl);}
.btn-secondary{background:transparent;color:var(--cr);border-color:rgba(139,26,26,.35);}
.btn-secondary:hover{background:rgba(139,26,26,.07);}
.btn-gold{background:var(--go);color:#1a1209;border-color:var(--gl);}
.btn-gold:hover{background:var(--gl);}
.btn-sm{padding:.28rem .6rem;font-size:.6rem;}
.btn-danger{background:rgba(139,26,26,.12);color:var(--cr);border-color:rgba(139,26,26,.3);}
.btn-danger:hover{background:var(--cr);color:var(--p);}
.btn-green{background:rgba(26,92,42,.12);color:var(--green);border-color:rgba(26,92,42,.3);}
.btn-green:hover{background:var(--green);color:white;}
/* Inputs */
input[type=text],input[type=number],select{padding:.42rem .65rem;border:1px solid rgba(139,26,26,.3);border-radius:3px;background:rgba(248,237,205,.7);font-family:"Crimson Pro",serif;font-size:.92rem;color:var(--ink);outline:none;width:100%;}
input:focus,select:focus{border-color:var(--cr);background:rgba(248,237,205,.95);}
label{font-family:"Cinzel",serif;font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--cr);display:block;margin-bottom:.25rem;}
.row{display:flex;gap:.6rem;align-items:flex-end;flex-wrap:wrap;margin-bottom:.7rem;}
.field{flex:1;min-width:80px;}
/* ── COMBAT TRACKER ── */
.combatants{display:flex;flex-direction:column;gap:.5rem;margin-bottom:1rem;}
.combatant{border:1px solid rgba(139,26,26,.2);border-radius:4px;padding:.6rem .8rem;background:rgba(248,237,205,.5);transition:all .2s;position:relative;}
.combatant.active{border-color:var(--go);background:rgba(201,151,58,.1);box-shadow:0 0 0 2px rgba(201,151,58,.3);}
.combatant.dead{opacity:.45;background:rgba(50,50,50,.08);border-color:#999;}
.combatant.player{border-left:3px solid var(--green);}
.combatant.monster{border-left:3px solid var(--cr);}
.comb-top{display:flex;align-items:center;gap:.6rem;flex-wrap:wrap;}
.comb-name{font-family:"Cinzel",serif;font-size:.85rem;font-weight:600;color:var(--ink);flex:1;min-width:100px;cursor:default;position:relative;}
.comb-name.has-stat:hover .stat-tooltip{display:block;}
.stat-tooltip{display:none;position:absolute;left:0;top:100%;z-index:100;background:#1a1209;color:var(--pd);font-family:"Crimson Pro",serif;font-size:.78rem;padding:.7rem .9rem;border-radius:4px;border:1px solid var(--go);min-width:280px;max-width:340px;box-shadow:0 4px 20px rgba(0,0,0,.8);line-height:1.5;white-space:normal;}
.stat-tooltip h4{font-family:"Cinzel",serif;font-size:.75rem;color:var(--gl);margin-bottom:.3rem;}
.stat-row{display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:.3rem;}
.stat-block{text-align:center;min-width:40px;}
.stat-block .sv{font-size:.65rem;color:rgba(244,232,193,.5);}
.stat-block .vl{font-size:.88rem;color:var(--pd);font-weight:600;}
.comb-ini{font-family:"Cinzel",serif;font-size:.82rem;color:var(--go);width:28px;text-align:center;font-weight:700;}
.comb-hp-bar{flex:1;min-width:120px;}
.hp-track{display:flex;align-items:center;gap:.4rem;}
.hp-cur{font-family:"Cinzel",serif;font-size:.92rem;font-weight:700;min-width:36px;text-align:right;}
.hp-max{font-size:.75rem;color:var(--il);white-space:nowrap;}
.hp-bar{height:6px;background:rgba(139,26,26,.15);border-radius:3px;flex:1;overflow:hidden;}
.hp-fill{height:100%;border-radius:3px;transition:width .3s,background .3s;}
.comb-actions{display:flex;gap:.3rem;align-items:center;flex-wrap:wrap;}
.dmg-inp{width:60px !important;padding:.28rem .4rem !important;font-size:.82rem !important;}
.turn-indicator{width:10px;height:10px;border-radius:50%;background:var(--go);flex-shrink:0;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
/* Round banner */
.round-banner{background:rgba(139,26,26,.08);border:1px solid rgba(139,26,26,.2);border-radius:4px;padding:.5rem 1rem;text-align:center;margin-bottom:1rem;font-family:"Cinzel",serif;font-size:.75rem;color:var(--cr);letter-spacing:.1em;}
/* ── ENCOUNTER BUILDER ── */
.enc-result{margin-top:.8rem;padding:.7rem;background:rgba(201,151,58,.06);border:1px solid rgba(201,151,58,.25);border-radius:4px;}
.enc-result-title{font-family:"Cinzel",serif;font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;color:var(--go);margin-bottom:.45rem;}
.enc-monster-row{display:flex;justify-content:space-between;align-items:center;padding:.25rem 0;border-bottom:1px solid rgba(139,26,26,.07);font-size:.88rem;gap:.5rem;}
.enc-monster-name{flex:1;cursor:pointer;position:relative;}
.enc-monster-name:hover{color:var(--cr);}
.enc-monster-name:hover .stat-tooltip{display:block;}
.enc-add{padding:.18rem .5rem !important;}
.difficulty-badge{display:inline-block;padding:.15rem .55rem;border-radius:99px;font-size:.68rem;font-family:"Cinzel",serif;letter-spacing:.06em;}
.diff-trivial{background:rgba(100,100,100,.1);color:#666;border:1px solid #999;}
.diff-easy{background:rgba(26,92,42,.1);color:var(--green);border:1px solid rgba(26,92,42,.3);}
.diff-medium{background:rgba(201,151,58,.12);color:#7a5c10;border:1px solid rgba(201,151,58,.3);}
.diff-hard{background:rgba(200,80,0,.1);color:#b85000;border:1px solid rgba(200,80,0,.3);}
.diff-deadly{background:rgba(139,26,26,.1);color:var(--cr);border:1px solid rgba(139,26,26,.3);}
/* Monster picker autocomplete */
.autocomplete-wrap{position:relative;}
.autocomplete-list{position:absolute;left:0;right:0;top:100%;background:#1a1209;border:1px solid var(--go);border-radius:0 0 4px 4px;z-index:200;max-height:200px;overflow-y:auto;}
.ac-item{padding:.35rem .7rem;font-size:.88rem;color:var(--pd);cursor:pointer;display:flex;justify-content:space-between;}
.ac-item:hover{background:rgba(201,151,58,.15);}
.ac-cr{font-size:.72rem;color:rgba(244,232,193,.4);}
/* Log */
.log{max-height:140px;overflow-y:auto;font-size:.8rem;color:var(--il);background:rgba(0,0,0,.04);border:1px solid rgba(139,26,26,.1);border-radius:3px;padding:.4rem .6rem;}
.log-entry{padding:.1rem 0;border-bottom:1px solid rgba(139,26,26,.05);}
.log-entry.dmg{color:var(--cr);}
.log-entry.heal{color:var(--green);}
.log-entry.dead{color:#888;font-style:italic;}
.log-entry.turn{color:var(--go);font-weight:600;}
/* Tabs */
.tabs2{display:flex;border-bottom:2px solid rgba(139,26,26,.2);margin-bottom:.9rem;}
.tb2{flex:1;padding:.5rem .5rem;font-family:"Cinzel",serif;font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:rgba(139,26,26,.5);background:transparent;border:none;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;}
.tb2.on{color:var(--cr);border-bottom-color:var(--cr);}
.tab-pnl{display:none;}
.tab-pnl.on{display:block;}
/* XP meter */
.xp-meter{margin-top:.6rem;font-size:.82rem;color:var(--il);}
.xp-bar-wrap{height:8px;background:rgba(139,26,26,.12);border-radius:4px;margin:.3rem 0;overflow:hidden;}
.xp-bar{height:100%;border-radius:4px;transition:width .3s;}
/* Responsive */
@media(max-width:800px){.layout{grid-template-columns:1fr;}.stat-tooltip{left:0;right:auto;min-width:240px;}}
</style>
</head>
<body>
<div style="max-width:1200px;margin:0 auto">
  <a href="index.html" class="back">← Back to Home</a>
</div>
<h1>Character Forge</h1>
<div class="dv"></div>
<div class="sub">Combat Tracker &amp; Encounter Builder</div>

<div class="layout">

<!-- ═══════════════════════ LEFT: COMBAT TRACKER ═══════════════════════ -->
<div>
  <div class="panel" style="margin-bottom:1.2rem;">
    <div class="panel-hdr">
      ⚔ Combat Tracker
      <div style="display:flex;gap:.5rem;">
        <button class="btn btn-gold btn-sm" onclick="rollInitiative()">🎲 Roll Initiative</button>
        <button class="btn btn-secondary btn-sm" onclick="nextTurn()">Next Turn ›</button>
        <button class="btn btn-secondary btn-sm" onclick="resetCombat()">↺ Reset</button>
      </div>
    </div>
    <div class="panel-body">
      <!-- Round banner -->
      <div class="round-banner" id="round-banner">Round 1 — Press "Roll Initiative" to begin</div>

      <!-- Add player -->
      <div class="sec">Add Player</div>
      <div class="row">
        <div class="field"><label>Name</label><input type="text" id="p-name" placeholder="Player name" onkeydown="if(event.key==='Enter')addPlayer()"></div>
        <div class="field" style="max-width:80px"><label>Init. Mod</label><input type="number" id="p-ini" value="2" style="width:100%"></div>
        <div class="field" style="max-width:80px"><label>Max HP</label><input type="number" id="p-hp" value="20" style="width:100%"></div>
        <button class="btn btn-secondary" style="margin-bottom:0" onclick="addPlayer()">+ Add</button>
      </div>

      <!-- Add monster manually -->
      <div class="sec">Add Monster</div>
      <div class="row">
        <div class="field autocomplete-wrap">
          <label>Monster (type to search)</label>
          <input type="text" id="m-search" placeholder="e.g. Goblin, Wolf…" oninput="monsterSearch()" onkeydown="acKeydown(event)" autocomplete="off">
          <div class="autocomplete-list" id="ac-list" style="display:none"></div>
        </div>
        <div class="field" style="max-width:70px"><label>Count</label><input type="number" id="m-count" value="1" min="1" max="20" style="width:100%"></div>
        <button class="btn btn-secondary" style="margin-bottom:0" onclick="addSelectedMonster()">+ Add</button>
      </div>

      <!-- Combatant list -->
      <div class="sec" style="margin-top:.5rem;">Initiative Order</div>
      <div class="combatants" id="combatant-list">
        <div style="text-align:center;padding:1.5rem;color:var(--il);font-style:italic;">Add players and monsters, then roll initiative.</div>
      </div>

      <!-- Log -->
      <div class="sec">Combat Log</div>
      <div class="log" id="combat-log"><div class="log-entry">Combat not started.</div></div>
    </div>
  </div>
</div>

<!-- ═══════════════════════ RIGHT: ENCOUNTER BUILDER ═══════════════════════ -->
<div>
  <div class="panel">
    <div class="panel-hdr">🐉 Encounter Builder</div>
    <div class="panel-body">
      <div class="tabs2">
        <button class="tb2 on" onclick="showEncTab('random')">Random</button>
        <button class="tb2" onclick="showEncTab('manual')">By CR/Type</button>
      </div>

      <!-- RANDOM TAB -->
      <div class="tab-pnl on" id="enc-random">
        <div class="row">
          <div class="field">
            <label>Party Size</label>
            <input type="number" id="enc-party" value="4" min="1" max="10">
          </div>
          <div class="field">
            <label>Party Level</label>
            <select id="enc-level">
              <option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option><option value="10">10</option><option value="11">11</option><option value="12">12</option><option value="13">13</option><option value="14">14</option><option value="15">15</option><option value="16">16</option><option value="17">17</option><option value="18">18</option><option value="19">19</option><option value="20">20</option>
            </select>
          </div>
        </div>
        <div class="row">
          <div class="field">
            <label>Difficulty</label>
            <select id="enc-diff">
              <option value="easy">Easy</option>
              <option value="medium" selected>Medium</option>
              <option value="hard">Hard</option>
              <option value="deadly">Deadly</option>
              <option value="random">Random</option>
            </select>
          </div>
          <div class="field">
            <label>Environment</label>
            <select id="enc-env">
              <option value="any">Any</option>
              <option value="forest">Forest</option>
              <option value="dungeon">Dungeon</option>
              <option value="mountain">Mountain</option>
              <option value="arctic">Arctic</option>
              <option value="underdark">Underdark</option>
              <option value="coastal">Coastal</option>
              <option value="desert">Desert</option>
              <option value="swamp">Swamp</option>
              <option value="plains">Plains</option>
              <option value="urban">Urban</option>
            </select>
          </div>
        </div>
        <button class="btn btn-primary" style="width:100%;justify-content:center;margin-bottom:.5rem" onclick="generateEncounter()">🎲 Generate Encounter</button>
      </div>

      <!-- MANUAL TAB -->
      <div class="tab-pnl" id="enc-manual">
        <div class="row">
          <div class="field">
            <label>CR</label>
            <select id="enc-cr">
              <option value="any">Any CR</option>
              <option value="0.125">CR 1/8</option>
              <option value="0.25">CR 1/4</option>
              <option value="0.5">CR 1/2</option>
              <option value="1">CR 1</option><option value="2">CR 2</option><option value="3">CR 3</option><option value="4">CR 4</option><option value="5">CR 5</option><option value="6">CR 6</option><option value="7">CR 7</option><option value="8">CR 8</option><option value="9">CR 9</option><option value="10">CR 10</option><option value="11">CR 11</option><option value="12">CR 12</option><option value="13">CR 13</option><option value="14">CR 14</option><option value="15">CR 15</option><option value="16">CR 16</option><option value="17">CR 17</option><option value="18">CR 18</option><option value="19">CR 19</option><option value="20">CR 20</option><option value="21">CR 21</option><option value="22">CR 22</option><option value="23">CR 23</option><option value="24">CR 24</option>
            </select>
          </div>
          <div class="field">
            <label>Type</label>
            <select id="enc-type">
              <option value="any">Any Type</option>
              <option>aberration</option><option>beast</option><option>celestial</option>
              <option>construct</option><option>dragon</option><option>elemental</option>
              <option>fey</option><option>fiend</option><option>giant</option>
              <option>humanoid</option><option>monstrosity</option><option>ooze</option>
              <option>plant</option><option>undead</option>
            </select>
          </div>
          <div class="field" style="max-width:70px">
            <label>Count</label>
            <input type="number" id="enc-num" value="1" min="1" max="12">
          </div>
        </div>
        <button class="btn btn-primary" style="width:100%;justify-content:center;margin-bottom:.5rem" onclick="generateManual()">🎲 Build Encounter</button>
      </div>

      <!-- Result -->
      <div id="enc-result" style="display:none" class="enc-result">
        <div class="enc-result-title" id="enc-title">Encounter</div>
        <div id="enc-monsters"></div>
        <div class="xp-meter" id="xp-meter"></div>
        <div style="display:flex;gap:.5rem;margin-top:.6rem;flex-wrap:wrap;">
          <button class="btn btn-gold btn-sm" style="flex:1;justify-content:center" onclick="addEncounterToTracker()">⚔ Add to Tracker</button>
          <button class="btn btn-secondary btn-sm" style="flex:1;justify-content:center" onclick="rerollEncounter()">🎲 Reroll</button>
        </div>
      </div>

      <!-- Party XP Budget -->
      <div style="margin-top:1rem;">
        <div class="sec">Party XP Thresholds</div>
        <div id="party-budget" style="font-size:.82rem;color:var(--il);"></div>
      </div>
    </div>
  </div>
</div>

</div><!-- /layout -->

function addPlayer() {
  var name   = document.getElementById('p-name').value.trim() || 'Player';
  var iniMod = parseInt(document.getElementById('p-ini').value) || 0;
  var maxHp  = parseInt(document.getElementById('p-hp').value)  || 10;
  combatants.push({id:genId(),name:name,type:'player',hp:maxHp,maxHp:maxHp,ac:10,ini:0,iniMod:iniMod,roll:0,dead:false,monster:null});
  document.getElementById('p-name').value='';
  log('Added player: '+name);
  renderCombatants();
}

function addMonsterEntry(m, countOverride) {
  var count  = countOverride || parseInt(document.getElementById('m-count').value)||1;
  var maxHp  = m.hp || 10;
  var iniMod = Math.floor(((m.dex||10)-10)/2);
  for (var i=0;i<count;i++) {
    var label = count>1 ? m.n+' '+(i+1) : m.n;
    combatants.push({id:genId(),name:label,type:'monster',hp:maxHp,maxHp:maxHp,ac:m.ac||10,ini:0,iniMod:iniMod,roll:0,dead:false,monster:m});
  }
  log('Added '+count+'× '+m.n+' (HP:'+maxHp+', AC:'+m.ac+', CR:'+m.cr+')');
  renderCombatants();
  // Reset search
  document.getElementById('m-search').value='';
  selectedMonster=null;
  document.getElementById('ac-list').style.display='none';
}

var selectedMonster = null;

function addSelectedMonster() {
  if (!selectedMonster) { alert('Search for and select a monster first.'); return; }
  addMonsterEntry(selectedMonster);
}

/* ─────────────────────────────────────────────────────────────────────────────
   INITIATIVE
───────────────────────────────────────────────────────────────────────────── */
function d20(){ return Math.floor(Math.random()*20)+1; }

function rollInitiative() {
  if (!combatants.length) { alert('Add some combatants first.'); return; }
  combatants.forEach(function(c){
    var r = d20();
    c.roll = r;
    c.ini  = r + c.iniMod;
  });
  combatants.sort(function(a,b){
    if(b.ini!==a.ini) return b.ini-a.ini;
    return b.iniMod-a.iniMod;
  });
  currentIdx = 0;
  round = 1;
  started = true;
  log('=== Combat Begin — Round 1 ===','turn');
  combatants.forEach(function(c){ log(c.name+': rolled '+(c.roll)+' + '+(c.iniMod>=0?'+':'')+c.iniMod+' = '+c.ini); });
  renderCombatants();
  updateRoundBanner();
}

function nextTurn() {
  if (!started || !combatants.length) return;
  // Skip dead
  var alive = combatants.filter(function(c){return !c.dead;});
  if (!alive.length) { log('All combatants are dead.','dead'); return; }
  
  var tries = 0;
  do {
    currentIdx = (currentIdx+1) % combatants.length;
    tries++;
    if (tries > combatants.length) break;
  } while (combatants[currentIdx].dead);

  if (currentIdx === 0 || combatants.slice(0,currentIdx).every(function(c){return c.dead;})) {
    // New round when we wrap
    round++;
    log('=== Round '+round+' ===','turn');
  }
  var cur = combatants[currentIdx];
  log('\u25ba '+cur.name+'\u2019s turn','turn');
  renderCombatants();
  updateRoundBanner();
}

function updateRoundBanner(){
  var cur = started && combatants[currentIdx];
  var txt = 'Round '+round;
  if (cur) txt += ' — ' + cur.name + '\u2019s turn';
  document.getElementById('round-banner').textContent = txt;
}

function resetCombat(){
  if (!confirm('Reset combat? All HP and initiative will be reset.')) return;
  combatants.forEach(function(c){c.hp=c.maxHp;c.dead=false;c.ini=0;c.roll=0;});
  currentIdx=-1; round=1; started=false;
  document.getElementById('round-banner').textContent='Round 1 — Press "Roll Initiative" to begin';
  clearLog();
  renderCombatants();
}

/* ─────────────────────────────────────────────────────────────────────────────
   DAMAGE / HEAL
───────────────────────────────────────────────────────────────────────────── */
function applyDamage(id) {
  var inp = document.getElementById('dmg-'+id);
  var val = parseInt(inp.value)||0;
  if (!val) return;
  var c = combatants.find(function(x){return x.id===id;});
  if (!c) return;
  c.hp = Math.max(0, c.hp - val);
  if (c.hp === 0 && !c.dead) {
    c.dead = true;
    log(c.name+' has fallen! (0 HP)','dead');
  } else {
    log(c.name+': -'+val+' HP → '+c.hp+'/'+c.maxHp,'dmg');
  }
  inp.value='';
  renderCombatants();
}

function applyHeal(id) {
  var inp = document.getElementById('heal-'+id);
  var val = parseInt(inp.value)||0;
  if (!val) return;
  var c = combatants.find(function(x){return x.id===id;});
  if (!c) return;
  var was = c.hp;
  c.hp = Math.min(c.maxHp, c.hp + val);
  c.dead = c.hp <= 0;
  log(c.name+': +'+val+' HP → '+c.hp+'/'+c.maxHp,'heal');
  inp.value='';
  renderCombatants();
}

function removeCombatant(id) {
  combatants = combatants.filter(function(x){return x.id!==id;});
  if (currentIdx >= combatants.length) currentIdx = Math.max(0,combatants.length-1);
  renderCombatants();
}

/* ─────────────────────────────────────────────────────────────────────────────
   RENDER
───────────────────────────────────────────────────────────────────────────── */
function renderCombatants() {
  var list = document.getElementById('combatant-list');
  if (!combatants.length) {
    list.innerHTML = '<div style="text-align:center;padding:1.5rem;color:var(--il);font-style:italic;">Add players and monsters, then roll initiative.</div>';
    return;
  }
  list.innerHTML = '';
  combatants.forEach(function(c, idx) {
    var pct = c.maxHp > 0 ? Math.max(0, Math.min(100, (c.hp / c.maxHp) * 100)) : 0;
    var hpColor = pct > 60 ? '#1a5c2a' : pct > 30 ? '#c9973a' : '#8b1a1a';
    var isActive = started && idx === currentIdx && !c.dead;

    var div = document.createElement('div');
    div.className = 'combatant ' + c.type + (c.dead ? ' dead' : '') + (isActive ? ' active' : '');

    var top = document.createElement('div');
    top.className = 'comb-top';

    var dot = document.createElement('div');
    dot.style.cssText = 'width:10px;height:10px;border-radius:50%;flex-shrink:0;' + (isActive ? 'background:var(--go);animation:pulse 1s infinite;' : '');
    top.appendChild(dot);

    var iniEl = document.createElement('div');
    iniEl.className = 'comb-ini';
    iniEl.textContent = (started && c.ini) ? c.ini : '-';
    top.appendChild(iniEl);

    var nameEl = document.createElement('div');
    nameEl.className = 'comb-name' + (c.monster && c.monster.str ? ' has-stat' : '');
    var nameSpan = document.createElement('span');
    nameSpan.textContent = c.name;
    nameEl.appendChild(nameSpan);
    if (c.type === 'monster' && c.monster) {
      var crTag = document.createElement('span');
      crTag.style.cssText = 'font-size:.65rem;color:var(--il);margin-left:.3rem;';
      crTag.textContent = 'CR' + c.monster.cr;
      nameEl.appendChild(crTag);
      if (c.monster.str) {
        nameEl.appendChild(buildStatTip(c.monster));
      }
    }
    top.appendChild(nameEl);

    var hpWrap = document.createElement('div');
    hpWrap.className = 'comb-hp-bar';
    hpWrap.innerHTML = '<div class="hp-track"><div class="hp-cur" style="color:' + hpColor + '">' + c.hp + '</div><div class="hp-max">/ ' + c.maxHp + '</div></div>'
      + '<div class="hp-bar"><div class="hp-fill" style="width:' + pct + '%;background:' + hpColor + ';"></div></div>';
    top.appendChild(hpWrap);

    var acts = document.createElement('div');
    acts.className = 'comb-actions';
    if (c.dead) {
      var ds = document.createElement('span');
      ds.style.cssText = 'font-size:.72rem;color:#888;';
      ds.textContent = 'Dead';
      acts.appendChild(ds);
    } else {
      (function(cid) {
        var di = document.createElement('input');
        di.type = 'number'; di.className = 'dmg-inp'; di.id = 'dmg-' + cid; di.placeholder = 'dmg'; di.min = '0';
        di.addEventListener('keydown', function(e) { if (e.keyCode === 13) applyDamage(cid); });
        var db = document.createElement('button');
        db.className = 'btn btn-danger btn-sm'; db.textContent = '-HP';
        db.addEventListener('click', function() { applyDamage(cid); });
        var hi = document.createElement('input');
        hi.type = 'number'; hi.className = 'dmg-inp'; hi.id = 'heal-' + cid; hi.placeholder = 'heal'; hi.min = '0';
        hi.addEventListener('keydown', function(e) { if (e.keyCode === 13) applyHeal(cid); });
        var hb = document.createElement('button');
        hb.className = 'btn btn-green btn-sm'; hb.textContent = '+HP';
        hb.addEventListener('click', function() { applyHeal(cid); });
        acts.appendChild(di); acts.appendChild(db); acts.appendChild(hi); acts.appendChild(hb);
      })(c.id);
    }
    var rb = document.createElement('button');
    rb.className = 'btn btn-secondary btn-sm'; rb.title = 'Remove'; rb.textContent = 'X';
    (function(cid) { rb.addEventListener('click', function() { removeCombatant(cid); }); })(c.id);
    acts.appendChild(rb);
    top.appendChild(acts);
    div.appendChild(top);
    list.appendChild(div);
  });
}

function buildStatTip(m) {
  var tip = document.createElement('div');
  tip.className = 'stat-tooltip';
  var html = '<h4>' + esc(m.n) + ' (CR ' + m.cr + ')</h4>';
  html += '<div style="font-size:.72rem;color:rgba(244,232,193,.5);margin-bottom:.4rem;">' + esc(m.sz||'') + ' ' + esc(m.ty||'') + ' - ' + esc(m.al||'') + '</div>';
  html += '<div style="font-size:.78rem;margin-bottom:.35rem;"><strong>AC</strong> ' + esc(String(m.acd||m.ac||'')) + ' &nbsp;<strong>HP</strong> ' + esc(String(m.hpd||m.hp||'')) + ' &nbsp;<strong>Speed</strong> ' + esc(m.sp||'') + '</div>';
  html += '<div class="stat-row">';
  [['STR','str'],['DEX','dex'],['CON','con'],['INT','int'],['WIS','wis'],['CHA','cha']].forEach(function(p) {
    var val = parseInt(m[p[1]]) || 10;
    var mod = Math.floor((val - 10) / 2);
    html += '<div class="stat-block"><div class="sv">' + p[0] + '</div><div class="vl">' + val + ' (' + (mod >= 0 ? '+' : '') + mod + ')</div></div>';
  });
  html += '</div>';
  if (m.sv) html += '<div style="font-size:.7rem;margin-top:.15rem;"><strong>Saves</strong> ' + esc(m.sv) + '</div>';
  if (m.sk) html += '<div style="font-size:.7rem;"><strong>Skills</strong> ' + esc(m.sk) + '</div>';
  if (m.se) html += '<div style="font-size:.7rem;"><strong>Senses</strong> ' + esc(m.se) + '</div>';
  if (m.la) html += '<div style="font-size:.7rem;"><strong>Languages</strong> ' + esc(m.la) + '</div>';
  tip.innerHTML = html;
  return tip;
}

var acHighlight = -1;

function monsterSearch() {
  var q = document.getElementById('m-search').value.trim().toLowerCase();
  var list = document.getElementById('ac-list');
  if (!q) { list.style.display='none'; return; }
  var results = MONSTERS.filter(function(m){ return m.n.toLowerCase().indexOf(q)!==-1; }).slice(0,12);
  if (!results.length) { list.style.display='none'; return; }
  list.innerHTML='';
  results.forEach(function(m,i){
    var div=document.createElement('div');
    div.className='ac-item';
    div.innerHTML='<span>'+esc(m.n)+'</span><span class="ac-cr">CR '+m.cr+' '+m.ty+'</span>';
    div.addEventListener('mousedown',function(e){e.preventDefault(); selectMonster(m);});
    list.appendChild(div);
  });
  list.style.display='block';
  acHighlight=-1;
}

function acKeydown(e) {
  var list = document.getElementById('ac-list');
  var items = list.querySelectorAll('.ac-item');
  if (e.key==='ArrowDown'){e.preventDefault();acHighlight=Math.min(acHighlight+1,items.length-1);highlightAc(items);}
  else if(e.key==='ArrowUp'){e.preventDefault();acHighlight=Math.max(acHighlight-1,0);highlightAc(items);}
  else if(e.key==='Enter'){e.preventDefault();if(acHighlight>=0&&items[acHighlight]){items[acHighlight].dispatchEvent(new Event('mousedown'));}else if(selectedMonster){addSelectedMonster();}}
  else if(e.key==='Escape'){list.style.display='none';}
}
function highlightAc(items){
  items.forEach(function(el,i){el.style.background=i===acHighlight?'rgba(201,151,58,.2)':'';});
}
function selectMonster(m){
  selectedMonster=m;
  document.getElementById('m-search').value=m.n;
  document.getElementById('ac-list').style.display='none';
}
document.addEventListener('click',function(e){
  if(!e.target.closest('.autocomplete-wrap')) document.getElementById('ac-list').style.display='none';
});

function crFloat(cr){
  var s=String(cr);
  if(s==='1/8') return 0.125;
  if(s==='1/4') return 0.25;
  if(s==='1/2') return 0.5;
  return parseFloat(s)||0;
}

function getMultiplier(n){
  if(n<=0) return 1;
  for(var i=MULTI.length-1;i>=0;i--){ if(n>=MULTI[i][0]) return MULTI[i][1]; }
  return 1;
}

function difficultyLabel(xp, partySize, level) {
  var t = XP_THRES[level] || XP_THRES[1];
  var easy=t[0]*partySize, med=t[1]*partySize, hard=t[2]*partySize, deadly=t[3]*partySize;
  if(xp<easy) return {d:'Trivial',c:'trivial'};
  if(xp<med)  return {d:'Easy',c:'easy'};
  if(xp<hard) return {d:'Medium',c:'medium'};
  if(xp<deadly)return{d:'Hard',c:'hard'};
  return {d:'Deadly',c:'deadly'};
}

function generateEncounter() {
  var partySize = parseInt(document.getElementById('enc-party').value)||4;
  var level     = parseInt(document.getElementById('enc-level').value)||5;
  var diffSel   = document.getElementById('enc-diff').value;
  var env       = document.getElementById('enc-env').value;

  var diffMap   = {easy:0,medium:1,hard:2,deadly:3,random:Math.floor(Math.random()*4)};
  var diffIdx   = diffMap[diffSel];
  if(diffSel==='random') diffIdx=Math.floor(Math.random()*4);
  var diffNames = ['Easy','Medium','Hard','Deadly'];

  var t = XP_THRES[level]||XP_THRES[1];
  var budget = t[diffIdx]*partySize;

  lastEncParams = {partySize,level,diffSel,env};

  // Filter monsters by environment
  var pool = MONSTERS.slice();
  if(env!=='any'){
    var envTypes=ENV_TYPES[env]||[];
    pool=pool.filter(function(m){
      var ty=(m.ty||'').toLowerCase();
      return envTypes.some(function(et){return ty.indexOf(et)!==-1;});
    });
    if(pool.length<5) pool=MONSTERS.slice(); // fallback
  }

  // Only monsters with full stat blocks
  pool=pool.filter(function(m){return m.ac&&m.hp&&m.cr>0;});

  // Try to build an encounter within budget
  var enc = buildEncounterFromBudget(pool, budget, partySize);
  lastEncounter = enc;
  showEncResult(enc, partySize, level, diffNames[diffIdx]);
}

function buildEncounterFromBudget(pool, budget, partySize) {
  // Try different monster counts (1..8) and pick a combination that fits
  var best = [];
  var maxTries = 40;

  for (var t=0;t<maxTries;t++) {
    // Pick a random monster from pool
    var m = pool[Math.floor(Math.random()*pool.length)];
    var mxp = CR_XP[m.cr]||10;
    
    // How many can we fit?
    var maxCount = 1;
    for (var n=1;n<=12;n++) {
      var adj = mxp * n * getMultiplier(n);
      if(adj <= budget*1.2) maxCount=n;
      else break;
    }
    var count = Math.max(1,Math.min(maxCount, Math.round(budget/(mxp*getMultiplier(maxCount)))+1));
    count = Math.min(count,12);

    var adjXP = mxp * count * getMultiplier(count);
    if (adjXP >= budget*0.6 && adjXP <= budget*1.3) {
      // Good match — maybe add a second monster type for variety
      var result = [{monster:m, count:count}];
      if (count > 2 && Math.random()>0.5) {
        // Split: reduce first monster, add a boss
        var half = Math.max(1,Math.floor(count/2));
        var remaining = budget - mxp*half*getMultiplier(half);
        var boss = pool.filter(function(m2){
          var bxp=CR_XP[m2.cr]||10;
          return m2.n!==m.n && bxp<=remaining*1.4 && bxp>=remaining*0.3;
        });
        if (boss.length) {
          var b = boss[Math.floor(Math.random()*boss.length)];
          result = [{monster:m,count:half},{monster:b,count:1}];
        }
      }
      if (result.length > best.length || (adjXP>=budget*0.7&&adjXP<=budget*1.1)) {
        best = result;
        if (adjXP>=budget*0.7 && adjXP<=budget*1.1) break;
      }
    }
  }

  // Fallback: just pick one monster
  if (!best.length) {
    var fb = pool[Math.floor(Math.random()*pool.length)];
    best = [{monster:fb,count:1}];
  }
  return best;
}

function generateManual() {
  var crSel  = document.getElementById('enc-cr').value;
  var typSel = document.getElementById('enc-type').value;
  var num    = parseInt(document.getElementById('enc-num').value)||1;
  var partySize = parseInt(document.getElementById('enc-party').value)||4;
  var level     = parseInt(document.getElementById('enc-level').value)||5;

  var pool = MONSTERS.filter(function(m){return m.ac&&m.hp;});
  if(crSel!=='any'){
    var crF=parseFloat(crSel);
    pool=pool.filter(function(m){return Math.abs(m.cr-crF)<0.01;});
  }
  if(typSel!=='any'){
    pool=pool.filter(function(m){return (m.ty||'').toLowerCase().indexOf(typSel)!==-1;});
  }
  if(!pool.length){alert('No monsters match those filters.');return;}

  var m = pool[Math.floor(Math.random()*pool.length)];
  lastEncounter=[{monster:m,count:num}];
  lastEncParams={partySize,level};
  var totalXP = (CR_XP[m.cr]||10)*num*getMultiplier(num);
  var diff=difficultyLabel(totalXP,partySize,level);
  showEncResult(lastEncounter, partySize, level, diff.d);
}

function showEncResult(enc, partySize, level, diffName) {
  var totalRawXP=0, totalAdjXP=0, totalCount=0;
  enc.forEach(function(e){
    var mxp=CR_XP[e.monster.cr]||10;
    totalRawXP+=mxp*e.count;
    totalCount+=e.count;
  });
  var multi=getMultiplier(totalCount);
  totalAdjXP=Math.round(totalRawXP*multi);
  var diff=difficultyLabel(totalAdjXP,partySize,level);

  var html='';
  enc.forEach(function(e){
    var m=e.monster;
    var mxp=CR_XP[m.cr]||10;
    html+='<div class="enc-monster-row">'
      +'<div class="enc-monster-name">'
        +esc(e.count>1?e.count+'× ':'')+esc(m.n)
        +buildStatTooltip(m)
      +'</div>'
      +'<span style="font-size:.75rem;color:var(--il);white-space:nowrap;">CR '+m.cr+' · '+(mxp*e.count).toLocaleString()+' XP</span>'
    +'</div>';
  });
  document.getElementById('enc-monsters').innerHTML=html;
  document.getElementById('enc-title').textContent=diffName+' Encounter ('+partySize+' players, Level '+level+')';

  // XP bar
  var t=XP_THRES[level]||XP_THRES[1];
  var deadlyThresh=t[3]*partySize;
  var pct=Math.min(100,(totalAdjXP/deadlyThresh)*100);
  var xpHtml='<div style="display:flex;justify-content:space-between;margin-bottom:.2rem;">'
    +'<span>Adjusted XP: <strong>'+totalAdjXP.toLocaleString()+'</strong> (×'+multi+' multiplier)</span>'
    +'<span class="difficulty-badge diff-'+diff.c+'">'+diff.d+'</span>'
    +'</div>'
    +'<div class="xp-bar-wrap"><div class="xp-bar" style="width:'+pct+'%;background:'+({trivial:'#666',easy:'#1a5c2a',medium:'#c9973a',hard:'#b85000',deadly:'#8b1a1a'}[diff.c]||'#8b1a1a')+'"></div></div>'
    +'<div style="display:flex;justify-content:space-between;font-size:.72rem;margin-top:.15rem;">'
    +'<span style="color:var(--green)">Easy: '+(t[0]*partySize).toLocaleString()+'</span>'
    +'<span>Medium: '+(t[1]*partySize).toLocaleString()+'</span>'
    +'<span>Hard: '+(t[2]*partySize).toLocaleString()+'</span>'
    +'<span style="color:var(--cr)">Deadly: '+(t[3]*partySize).toLocaleString()+'</span>'
    +'</div>';
  document.getElementById('xp-meter').innerHTML=xpHtml;

  document.getElementById('enc-result').style.display='block';
  updatePartyBudget();
}

function buildStatTooltip(m){
  if(!m.str) return '';
  var html='<div class="stat-tooltip">'
    +'<h4>'+m.n+'</h4>'
    +'<div style="font-size:.72rem;color:rgba(244,232,193,.5);margin-bottom:.35rem;">'+m.sz+' '+m.ty+' · '+m.al+'</div>'
    +'<div style="margin-bottom:.3rem;font-size:.78rem;"><strong>AC</strong> '+m.acd+' &nbsp; <strong>HP</strong> '+m.hpd+' &nbsp; <strong>Speed</strong> '+m.sp+'</div>'
    +'<div class="stat-row">';
  ['STR','DEX','CON','INT','WIS','CHA'].forEach(function(s,i){
    var key=['str','dex','con','int','wis','cha'][i];
    var val=parseInt(m[key])||10;
    var mod=Math.floor((val-10)/2);
    html+='<div class="stat-block"><div class="sv">'+s+'</div><div class="vl">'+val+' ('+(mod>=0?'+':'')+mod+')</div></div>';
  });
  html+='</div>';
  if(m.sv) html+='<div style="font-size:.7rem;margin-top:.2rem;"><strong>Saves</strong> '+m.sv+'</div>';
  if(m.sk) html+='<div style="font-size:.7rem;"><strong>Skills</strong> '+m.sk+'</div>';
  if(m.se) html+='<div style="font-size:.7rem;"><strong>Senses</strong> '+m.se+'</div>';
  html+='</div>';
  return html;
}

function rerollEncounter(){
  if(lastEncParams.diffSel!==undefined) generateEncounter();
  else generateManual();
}

function addEncounterToTracker(){
  if(!lastEncounter.length) return;
  lastEncounter.forEach(function(e){ addMonsterEntry(e.monster, e.count); });
  log('Added encounter to tracker: '+lastEncounter.map(function(e){return e.count+'× '+e.monster.n;}).join(', '));
}

function updatePartyBudget(){
  var partySize=parseInt(document.getElementById('enc-party').value)||4;
  var level=parseInt(document.getElementById('enc-level').value)||5;
  var t=XP_THRES[level]||XP_THRES[1];
  var html='<table style="width:100%;font-size:.8rem;border-collapse:collapse;">';
  ['Easy','Medium','Hard','Deadly'].forEach(function(d,i){
    html+='<tr><td style="padding:.15rem 0;color:var(--il);">'+d+'</td>'
      +'<td style="text-align:right;font-weight:600;color:var(--ink);">'+(t[i]*partySize).toLocaleString()+' XP</td></tr>';
  });
  html+='</table>';
  document.getElementById('party-budget').innerHTML=html;
}

/* ─────────────────────────────────────────────────────────────────────────────
   UTILS
───────────────────────────────────────────────────────────────────────────── */
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// Init
updatePartyBudget();
document.getElementById('enc-party').addEventListener('input',updatePartyBudget);
document.getElementById('enc-level').addEventListener('change',updatePartyBudget);
</script>
</body>
